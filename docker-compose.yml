services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: modden-backend
        restart: unless-stopped
        env_file:
            - ./backend/.env
        volumes:
            - ./backend/uploads:/app/uploads
        expose:
            - '3000'

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: modden-frontend
        restart: unless-stopped
        depends_on:
            - backend
        expose:
            - '80'

    nginx:
        image: nginx:1.27-alpine
        container_name: modden-nginx
        restart: unless-stopped
        depends_on:
            - frontend
            - backend
        ports:
            - '80:80'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
