services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: modden-backend
        restart: unless-stopped
        env_file:
            - ./backend/.env
        volumes:
            - ./backend/uploads:/app/uploads
        expose:
            - '3000'

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: modden-frontend
        restart: unless-stopped
        depends_on:
            - backend
        expose:
            - '80'

    caddy:
        image: caddy:2-alpine
        container_name: modden-caddy
        restart: unless-stopped
        depends_on:
            - frontend
            - backend
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config

volumes:
    caddy_data:
    caddy_config:
